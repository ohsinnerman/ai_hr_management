# Optional: nginx reverse proxy so the API is reachable on port 80/443 with SSE working.
# Place at /etc/nginx/conf.d/nexushr.conf  then:  sudo nginx -t && sudo systemctl reload nginx
# For HTTPS, run:  sudo certbot --nginx -d api.yourdomain.com   (needs a domain pointing here)

server {
    listen 80;
    server_name _;   # replace with api.yourdomain.com if you have one

    # SSE (AI chat) needs buffering off + long timeouts
    location /api/v1/ai/chat {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12M;   # résumé / document uploads (10MB + headroom)
    }
}
